name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Frontend (lint + test + build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: TypeScript typecheck
        run: npx tsc --noEmit

      - name: Run tests
        run: npx vitest run

      - name: Vite build
        run: npx vite build

  backend:
    name: Backend (Go)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum

      - name: Build all binaries
        run: |
          cd backend
          go build ./cmd/jockd/
          go build ./cmd/jockq/
          go build ./cmd/jockmcp/

      - name: Run tests
        run: cd backend && go test ./...

  electron-build:
    name: Electron (${{ matrix.os }})
    needs: [frontend, backend]
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            build-flag: --mac --publish never
          - os: ubuntu-latest
            build-flag: --linux --publish never
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum

      - name: Install dependencies
        run: npm ci

      - name: Build backend
        run: |
          mkdir -p backend/bin
          cd backend
          go build -o bin/jockd ./cmd/jockd/
          go build -o bin/jockq ./cmd/jockq/
          go build -o bin/jockmcp ./cmd/jockmcp/

      - name: Build frontend
        run: npx vite build

      - name: Package Electron app
        run: npx electron-builder ${{ matrix.build-flag }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: jock-${{ matrix.os }}
          path: release/*
          if-no-files-found: warn
