name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Release (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            build-flag: --mac
          - os: ubuntu-latest
            build-flag: --linux
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum

      - name: Install dependencies
        run: npm ci

      - name: Build backend
        run: |
          mkdir -p backend/bin
          cd backend
          go build -o bin/jockd ./cmd/jockd/
          go build -o bin/jockq ./cmd/jockq/
          go build -o bin/jockmcp ./cmd/jockmcp/

      - name: Build frontend
        run: npx vite build

      - name: Package Electron app
        run: npx electron-builder ${{ matrix.build-flag }} --publish never

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/*.dmg
            release/*.zip
            release/*.AppImage
            release/*.deb
            release/*.yml
          draft: true
          generate_release_notes: true
