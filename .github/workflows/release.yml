name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Release (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            build-flag: --mac
          - os: ubuntu-latest
            build-flag: --linux
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum

      - name: Install dependencies
        run: npm ci

      - name: Build backend
        run: |
          mkdir -p backend/bin
          cd backend
          go build -o bin/jockd ./cmd/jockd/
          go build -o bin/jockq ./cmd/jockq/
          go build -o bin/jockmcp ./cmd/jockmcp/

      - name: Build Vex
        run: |
          git clone https://github.com/praetordev/vex.git /tmp/vex
          cd /tmp/vex
          go build -o $GITHUB_WORKSPACE/backend/bin/vex ./cmd/vex/

      - name: Sign Go binaries
        if: matrix.os == 'macos-latest'
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
        run: |
          echo "$CSC_LINK" | base64 --decode > /tmp/cert.p12
          security create-keychain -p "" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "" build.keychain
          security import /tmp/cert.p12 -k build.keychain -P "$CSC_KEY_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k "" build.keychain
          IDENTITY=$(security find-identity -v -p codesigning build.keychain | head -1 | awk -F'"' '{print $2}')
          for bin in backend/bin/jockd backend/bin/jockq backend/bin/jockmcp backend/bin/vex; do
            codesign --force --options runtime --sign "$IDENTITY" --entitlements build/entitlements.mac.plist "$bin"
          done
          rm /tmp/cert.p12

      - name: Build frontend
        run: npx vite build

      - name: Package Electron app
        run: npx electron-builder ${{ matrix.build-flag }} --publish never
        env:
          CSC_LINK: ${{ matrix.os == 'macos-latest' && secrets.CSC_LINK || '' }}
          CSC_KEY_PASSWORD: ${{ matrix.os == 'macos-latest' && secrets.CSC_KEY_PASSWORD || '' }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/*.dmg
            release/*.zip
            release/*.AppImage
            release/*.deb
            release/*.yml
          draft: true
          generate_release_notes: true
